<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .list-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .list-item h4 {
            margin: 0 0 5px 0;
            color: #333;
        }

        .list-item p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Inventory Management System</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('users')">Users</button>
            <button class="tab-btn" onclick="switchTab('products')">Products</button>
            <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
        </div>

        <!-- Login Tab -->
        <div id="login" class="tab-content active">
            <h2>Login</h2>
            <div id="login-alert" class="alert"></div>
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="user@example.com">
            </div>
            <div class="form-group">
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" placeholder="password">
            </div>
            <button onclick="login()">Login</button>
        </div>

        <!-- Users Tab -->
        <div id="users" class="tab-content">
            <h2>Users</h2>
            <div id="users-alert" class="alert"></div>

            <div class="grid">
                <div>
                    <h3>Create User</h3>
                    <div class="form-group">
                        <label for="user-name">Name:</label>
                        <input type="text" id="user-name" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="user-email">Email:</label>
                        <input type="email" id="user-email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="user-password">Password:</label>
                        <input type="password" id="user-password" placeholder="password">
                    </div>
                    <button onclick="createUser()">Create User</button>
                </div>

                <div>
                    <h3>Get User</h3>
                    <div class="form-group">
                        <label for="user-id">User ID:</label>
                        <input type="number" id="user-id" placeholder="1">
                    </div>
                    <button onclick="getUser()">Get User</button>
                </div>
            </div>

            <h3>Users List</h3>
            <button onclick="listUsers()">Refresh Users</button>
            <div id="users-list"></div>
        </div>

        <!-- Products Tab -->
        <div id="products" class="tab-content">
            <h2>Products</h2>
            <div id="products-alert" class="alert"></div>

            <div class="grid">
                <div>
                    <h3>Create Product</h3>
                    <div class="form-group">
                        <label for="product-name">Product Name:</label>
                        <input type="text" id="product-name" placeholder="Widget">
                    </div>
                    <div class="form-group">
                        <label for="product-desc">Description:</label>
                        <textarea id="product-desc" placeholder="Product description..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="product-price">Price:</label>
                        <input type="number" id="product-price" placeholder="9.99" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="product-sku">SKU:</label>
                        <input type="text" id="product-sku" placeholder="WGT-001">
                    </div>
                    <button onclick="createProduct()">Create Product</button>
                </div>

                <div>
                    <h3>Update Product Price</h3>
                    <div class="form-group">
                        <label for="update-product-id">Product ID:</label>
                        <input type="number" id="update-product-id" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label for="update-product-price">New Price:</label>
                        <input type="number" id="update-product-price" placeholder="19.99" step="0.01">
                    </div>
                    <button onclick="updateProductPrice()">Update Price</button>
                </div>
            </div>

            <h3>Products List</h3>
            <button onclick="listProducts()">Refresh Products</button>
            <div id="products-list"></div>
        </div>

        <!-- Orders Tab -->
        <div id="orders" class="tab-content">
            <h2>Orders</h2>
            <div id="orders-alert" class="alert"></div>

            <div class="grid">
                <div>
                    <h3>Create Order</h3>
                    <div class="form-group">
                        <label for="order-user-id">User ID:</label>
                        <input type="number" id="order-user-id" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label for="order-product-id">Product ID:</label>
                        <input type="number" id="order-product-id" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label for="order-quantity">Quantity:</label>
                        <input type="number" id="order-quantity" placeholder="1" min="1" value="1">
                    </div>
                    <button onclick="createOrder()">Create Order</button>
                </div>

                <div>
                    <h3>Get Order</h3>
                    <div class="form-group">
                        <label for="order-id">Order ID:</label>
                        <input type="number" id="order-id" placeholder="1">
                    </div>
                    <button onclick="getOrder()">Get Order</button>
                </div>
            </div>

            <h3>Orders List</h3>
            <button onclick="listOrders()">Refresh Orders</button>
            <div id="orders-list"></div>
        </div>

        <div class="loading" id="loading">Loading...</div>
    </div>

    <script>
        const API_URL = "http://localhost:5001";
        let authToken = localStorage.getItem("authToken") || null;

        function switchTab(tabName) {
            const tabs = document.querySelectorAll(".tab-content");
            const btns = document.querySelectorAll(".tab-btn");
            tabs.forEach(t => t.classList.remove("active"));
            btns.forEach(b => b.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            event.target.classList.add("active");
        }

        function showAlert(containerId, message, type) {
            const container = document.getElementById(containerId);
            container.textContent = message;
            container.className = `alert ${type}`;
        }

        function showLoading(show = true) {
            document.getElementById("loading").style.display = show ? "block" : "none";
        }

        async function apiCall(method, endpoint, data = null) {
            try {
                showLoading(true);
                const options = {
                    method,
                    headers: {
                        "Content-Type": "application/json",
                    },
                };
                if (authToken) {
                    options.headers["Authorization"] = `Bearer ${authToken}`;
                }
                if (data) {
                    options.body = JSON.stringify(data);
                }
                const response = await fetch(`${API_URL}${endpoint}`, options);
                const json = await response.json();
                showLoading(false);
                return { status: response.status, data: json };
            } catch (error) {
                showLoading(false);
                console.error("API error:", error);
                return { status: 500, data: { error: error.message } };
            }
        }

        // Login
        async function login() {
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            if (!email || !password) {
                showAlert("login-alert", "Please fill in all fields", "error");
                return;
            }
            const result = await apiCall("POST", "/auth/login", { email, password });
            if (result.status === 200) {
                authToken = result.data.access_token;
                localStorage.setItem("authToken", authToken);
                showAlert("login-alert", `Login successful! Welcome ${email}`, "success");
            } else {
                showAlert("login-alert", result.data.error || "Login failed", "error");
            }
        }

        // Users
        async function createUser() {
            const name = document.getElementById("user-name").value;
            const email = document.getElementById("user-email").value;
            const password = document.getElementById("user-password").value;
            if (!name || !email || !password) {
                showAlert("users-alert", "Please fill in all fields", "error");
                return;
            }
            const result = await apiCall("POST", "/users/", { name, email, password });
            if (result.status === 201) {
                showAlert("users-alert", `User created! ID: ${result.data.id}`, "success");
                document.getElementById("user-name").value = "";
                document.getElementById("user-email").value = "";
                document.getElementById("user-password").value = "";
                listUsers();
            } else {
                showAlert("users-alert", result.data.error || "Failed to create user", "error");
            }
        }

        async function getUser() {
            const userId = document.getElementById("user-id").value;
            if (!userId) {
                showAlert("users-alert", "Please enter a user ID", "error");
                return;
            }
            const result = await apiCall("GET", `/users/${userId}`);
            if (result.status === 200) {
                const list = document.getElementById("users-list");
                list.innerHTML = `<div class="list-item"><h4>${result.data.name}</h4><p>Email: ${result.data.email}</p></div>`;
            } else {
                showAlert("users-alert", "User not found", "error");
            }
        }

        async function listUsers() {
            // Note: list endpoint not implemented, using mock
            showAlert("users-alert", "List endpoint coming soon", "success");
        }

        // Products
        async function createProduct() {
            const name = document.getElementById("product-name").value;
            const description = document.getElementById("product-desc").value;
            const price = parseFloat(document.getElementById("product-price").value);
            const sku = document.getElementById("product-sku").value;
            if (!name || price <= 0) {
                showAlert("products-alert", "Please fill in required fields", "error");
                return;
            }
            const result = await apiCall("POST", "/products/", { name, description, price, sku });
            if (result.status === 201) {
                showAlert("products-alert", `Product created! ID: ${result.data.id}`, "success");
                document.getElementById("product-name").value = "";
                document.getElementById("product-desc").value = "";
                document.getElementById("product-price").value = "";
                document.getElementById("product-sku").value = "";
                listProducts();
            } else {
                showAlert("products-alert", result.data.error || "Failed to create product", "error");
            }
        }

        async function updateProductPrice() {
            const productId = document.getElementById("update-product-id").value;
            const price = parseFloat(document.getElementById("update-product-price").value);
            if (!productId || price <= 0) {
                showAlert("products-alert", "Please fill in required fields", "error");
                return;
            }
            const result = await apiCall("PUT", `/products/${productId}`, { price });
            if (result.status === 200) {
                showAlert("products-alert", "Product price updated!", "success");
                listProducts();
            } else {
                showAlert("products-alert", result.data.error || "Failed to update product", "error");
            }
        }

        async function listProducts() {
            const result = await apiCall("GET", "/products/?page=1&per_page=10");
            if (result.status === 200) {
                const list = document.getElementById("products-list");
                list.innerHTML = result.data.items.map(p => 
                    `<div class="list-item"><h4>${p.name}</h4><p>Price: $${p.price} | SKU: ${p.sku || "N/A"}</p></div>`
                ).join("");
            } else {
                showAlert("products-alert", "Failed to load products", "error");
            }
        }

        // Orders
        async function createOrder() {
            const userId = parseInt(document.getElementById("order-user-id").value);
            const productId = parseInt(document.getElementById("order-product-id").value);
            const quantity = parseInt(document.getElementById("order-quantity").value);
            if (!userId || !productId || quantity <= 0) {
                showAlert("orders-alert", "Please fill in all fields", "error");
                return;
            }
            const result = await apiCall("POST", "/orders/", {
                user_id: userId,
                items: [{ product_id: productId, quantity }]
            });
            if (result.status === 201) {
                showAlert("orders-alert", `Order created! ID: ${result.data.id}`, "success");
                document.getElementById("order-user-id").value = "";
                document.getElementById("order-product-id").value = "";
                document.getElementById("order-quantity").value = "1";
                listOrders();
            } else {
                showAlert("orders-alert", result.data.error || "Failed to create order", "error");
            }
        }

        async function getOrder() {
            const orderId = document.getElementById("order-id").value;
            if (!orderId) {
                showAlert("orders-alert", "Please enter an order ID", "error");
                return;
            }
            const result = await apiCall("GET", `/orders/${orderId}`);
            if (result.status === 200) {
                const list = document.getElementById("orders-list");
                const items = result.data.items.map(i => `${i.quantity}x Product #${i.product_id}`).join(", ");
                list.innerHTML = `<div class="list-item"><h4>Order #${result.data.id}</h4><p>Total: $${result.data.total} | Items: ${items}</p></div>`;
            } else {
                showAlert("orders-alert", "Order not found", "error");
            }
        }

        async function listOrders() {
            showAlert("orders-alert", "Order list coming soon", "success");
        }

        // Auto-load on init
        listProducts();
    </script>
</body>
</html>
